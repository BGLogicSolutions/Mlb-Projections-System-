name: MLB Sabermetric Intelligence (Advanced Metrics)
on:
  workflow_dispatch: # Ejecución manual para reentrenamiento profundo

jobs:
  collect-and-calculate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install pandas requests numpy scikit-learn lightgbm

      - name: Sabermetric Engine
        run: |
          cat << 'EOF' > src/data/sabermetrics.py
          import pandas as pd
          import requests
          import numpy as np
          from datetime import datetime

          def get_advanced_stats(year, group="hitting"):
              print(f"Extrayendo {group} de la temporada {year}...")
              # Endpoint de MLB StatsAPI con hidratación de métricas avanzadas
              url = f"https://statsapi.mlb.com/api/v1/stats?stats=season&group={group}&season={year}&sportId=1"
              data = requests.get(url).json()
              
              stats_list = []
              if "stats" in data and len(data["stats"]) > 0:
                  for split in data["stats"][0]["splits"]:
                      player_name = split["player"]["fullName"]
                      s = split["stat"]
                      
                      if group == "hitting":
                          # Cálculos de Sabermetría para Bateo
                          obp = float(s.get("obp", 0))
                          slg = float(s.get("slg", 0))
                          avg = float(s.get("avg", 0))
                          iso = slg - avg
                          # Aproximación de wOBA (Pesos estándar)
                          woba = (0.69 * float(s.get("baseOnBalls", 0)) + 0.89 * float(s.get("hits", 0)) + 1.27 * float(s.get("doubles", 0)) + 1.62 * float(s.get("triples", 0)) + 2.10 * float(s.get("homeRuns", 0))) / max(float(s.get("atBats", 1)), 1)
                          
                          stats_list.append({
                              "name": player_name,
                              "year": year,
                              "OBP": obp,
                              "ISO": iso,
                              "wOBA": woba,
                              "OPS_plus": float(s.get("ops", 0)) * 100, # Simplificado
                              "HardHit_pct": float(s.get("hardHitPct", 0)) if "hardHitPct" in s else 40.0,
                              "Barrel_pct": float(s.get("barrelPct", 0)) if "barrelPct" in s else 8.0,
                              "WAR": float(s.get("war", 0)) if "war" in s else (woba * 5) # Proxy
                          })
                      
                      elif group == "pitching":
                          # Cálculos de Sabermetría para Pitcheo
                          ip = float(s.get("inningsPitched", 1))
                          k = float(s.get("strikeOuts", 0))
                          bb = float(s.get("baseOnBalls", 0))
                          hr = float(s.get("homeRuns", 0))
                          era = float(s.get("era", 0))
                          
                          # FIP Formula: ((13*HR)+(3*(BB+HBP))-(2*K))/IP + FIP_Constant(approx 3.10)
                          fip = ((13 * hr) + (3 * bb) - (2 * k)) / max(ip, 1) + 3.10
                          whip = float(s.get("whip", 0))
                          k_bb_pct = (k / max(float(s.get("battersFaced", 1)), 1)) - (bb / max(float(s.get("battersFaced", 1)), 1))
                          
                          stats_list.append({
                              "name": player_name,
                              "year": year,
                              "FIP": fip,
                              "xFIP": fip * 0.95, # Proxy basado en HR/FB estable
                              "SIERA": 20 * (bb/max(ip,1)) - 10 * (k/max(ip,1)) + 4.0, # Simplificada
                              "WHIP": whip,
                              "K_BB_pct": k_bb_pct,
                              "ERA_minus": (era / 4.20) * 100, # Ajustado a liga
                              "WPA": float(s.get("wpa", 0)) if "wpa" in s else 0.0
                          })
              return pd.DataFrame(stats_list)

          def build_master_dataset():
              years = [2024, 2025, 2026]
              all_data = []
              for y in years:
                  h = get_advanced_stats(y, "hitting")
                  p = get_advanced_stats(y, "pitching")
                  combined = pd.concat([h, p], axis=0)
                  all_data.append(combined)
              
              master_df = pd.concat(all_data, axis=0)
              os.makedirs('data', exist_ok=True)
              master_df.to_csv('data/mlb_advanced_intelligence.csv', index=False)
              print(f"✅ Dataset Maestro creado con {len(master_df)} registros.")

          if __name__ == "__main__":
              build_master_dataset()
          EOF
          python3 src/data/sabermetrics.py

      - name: Retrain Advanced Model
        run: |
          cat << 'EOF' > src/models/predictor.py
          import pandas as pd
          import lightgbm as lgb
          import os

          def train():
              df = pd.read_csv('data/mlb_advanced_intelligence.csv')
              # Limpiar nombres y años para el modelo
              X = df.select_dtypes(include=['number']).fillna(0)
              # Creamos un target basado en WAR/WPA (éxito del jugador)
              y = (X.get('WAR', 0) + X.get('WPA', 0) > X.get('WAR', 0).median()).astype(int)
              
              train_data = lgb.Dataset(X, label=y)
              model = lgb.train({'objective': 'binary', 'metric': 'auc', 'verbose': -1}, train_data)
              
              os.makedirs('models', exist_ok=True)
              model.save_model('models/mlb_sabermetric_model.txt')
              print("🧠 Cerebro Sabermétrico entrenado.")

          if __name__ == "__main__":
              train()
          EOF
          python3 src/models/predictor.py

      - name: Save Intelligence to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/mlb_advanced_intelligence.csv models/mlb_sabermetric_model.txt
          git commit -m "🚀 Sabermetric Intelligence Update: wOBA, FIP, SIERA, WAR included" || echo "No changes"
          git push origin main
