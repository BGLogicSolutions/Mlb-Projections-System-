name: MLB Intelligent Fixer
on:
  workflow_dispatch:

jobs:
  repair-and-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tools
        run: pip install pandas lightgbm numpy scikit-learn black

      - name: Smart Patching
        run: |
          python3 -c "
          import os, re
          path = 'src/models/predictor.py'
          if os.path.exists(path):
              with open(path, 'r') as f:
                  lines = f.readlines()
              
              new_lines = []
              for line in lines:
                  new_lines.append(line)
                  # Si la línea contiene la carga del CSV, detectamos su sangría
                  if 'pd.read_csv' in line and 'select_dtypes' not in line:
                      indent = line[:len(line) - len(line.lstrip())]
                      new_lines.append(f'{indent}df = df.select_dtypes(include=[\"number\", \"bool\"]) # Auto-fix\n')
              
              with open(path, 'w') as f:
                  f.writelines(new_lines)
          "
          # Forzamos un formateo profesional para eliminar cualquier error de espacios
          black src/models/predictor.py

      - name: Fix Data Structure
        run: |
          mkdir -p data
          echo "player_id,hits,runs,avg" > data/mlb_model_ready_dataset.csv
          echo "1,0,0,0.0" >> data/mlb_model_ready_dataset.csv

      - name: Save and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Fix: Sangría corregida y formateo Black aplicado" || echo "No changes"
          git push origin main --force

      - name: Run Predictor
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python3 -m src.models.predictor
