name: MLB Real-Time Projections
on:
  schedule:
    - cron: '0 14 * * *' # Se ejecuta automáticamente cada mañana
  workflow_dispatch:

jobs:
  fetch-and-predict:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install pandas lightgbm requests scikit-learn

      - name: Update Logic to Real MLB API
        run: |
          cat << 'EOF' > src/models/predictor.py
          import pandas as pd
          import requests
          from datetime import datetime
          import os

          def get_mlb_data():
              today = datetime.now().strftime('%Y-%m-%d')
              url = f"https://statsapi.mlb.com/api/v1/schedule?sportId=1&date={today}&hydrate=probablePitcher,team"
              response = requests.get(url).json()
              
              games_today = []
              if "dates" in response and len(response["dates"]) > 0:
                  for game in response["dates"][0]["games"]:
                      games_today.append({
                          "game_id": game["gamePk"],
                          "home_team": game["teams"]["home"]["team"]["name"],
                          "away_team": game["teams"]["away"]["team"]["name"],
                          "home_win_pct": float(game["teams"]["home"].get("leagueRecord", {}).get("pct", 0.500)),
                          "away_win_pct": float(game["teams"]["away"].get("leagueRecord", {}).get("pct", 0.500)),
                          "venue": game.get("venue", {}).get("name", "Unknown")
                      })
              return pd.DataFrame(games_today)

          def run_projections():
              df = get_mlb_data()
              if df.empty:
                  print("No hay juegos programados para hoy.")
                  return

              # Lógica de Predicción Simple basada en Win % y ventaja de localía
              # (Aquí podrías meter un modelo de LightGBM más complejo)
              df['home_win_probability'] = (df['home_win_pct'] * 1.1) / (df['home_win_pct'] + df['away_win_pct'])
              df['away_win_probability'] = 1 - df['home_win_probability']
              
              # Formatear resultados
              df['projection_date'] = datetime.now().strftime('%Y-%m-%d')
              os.makedirs('predictions', exist_ok=True)
              filename = f"predictions/mlb_projections_{datetime.now().strftime('%Y_%m_%d')}.csv"
              df.to_csv(filename, index=False)
              print(f"Proyecciones guardadas en {filename}")

          if __name__ == "__main__":
              run_projections()
          EOF

      - name: Execute Projections
        run: python3 src/models/predictor.py

      - name: Push Real Data to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add predictions/*.csv
          git commit -m "⚾ MLB Real-Time Projections: $(date +'%Y-%m-%d')" || echo "No changes"
          git push origin main
