name: MLB Daily Projections Automation

on:
  schedule:
    - cron: '0 8 * * *'  # Ejecución diaria a las 08:00 UTC
  workflow_dispatch:      # Permite ejecución manual desde la web de GitHub

jobs:
  predict_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run MLB Predictor
        run: |
          # Aquí se asume que el script principal se llama 'main_predictor.py'
          python main_predictor.py 

      - name: Commit and Push Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto-update: Daily Projections $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
